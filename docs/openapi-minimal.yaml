openapi: 3.0.3
info:
  title: 游客服务系统 API（最小契约）
  version: 2.5.0
servers:
  - url: http://localhost:8081
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ComplaintId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        displayName:
          type: string
    AuthUserResponse:
      type: object
      properties:
        username:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [VISITOR, ADMIN, COMPLAINT_HANDLER, HOTEL_ADMIN, SYSTEM_ADMIN]
        permissions:
          type: array
          items:
            type: string
    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/AuthUserResponse'
        - type: object
          properties:
            token:
              type: string
    ComplaintCreateRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        attachmentUrls:
          type: string
          nullable: true
    ComplaintActionRequest:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
    ComplaintAssignRequest:
      type: object
      required: [assigneeUsername]
      properties:
        assigneeUsername:
          type: string
        comment:
          type: string
          nullable: true
    ComplaintRatingRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
    EmergencyRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        validFrom:
          type: string
          format: date-time
          nullable: true
        validUntil:
          type: string
          format: date-time
          nullable: true
        alertLevel:
          type: string
          nullable: true
        alertType:
          type: string
          nullable: true
    EmergencyReviewRequest:
      type: object
      properties:
        comment:
          type: string
          nullable: true
    HotelAdminRequest:
      type: object
      required: [name, address, star, price, phone, score, hasBreakfast, facility, introduction]
      properties:
        name:
          type: string
        address:
          type: string
        star:
          type: integer
        price:
          type: integer
        phone:
          type: string
        score:
          type: number
        hasBreakfast:
          type: boolean
        facility:
          type: string
        introduction:
          type: string
        availabilityStatus:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
    ResourceItemRequest:
      type: object
      required: [title, location, description]
      properties:
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        location:
          type: string
        schedule:
          type: string
          nullable: true
        description:
          type: string
        coverImageUrl:
          type: string
          nullable: true
        online:
          type: boolean
          nullable: true
    SystemUserCreateRequest:
      type: object
      required: [username, displayName, role, password]
      properties:
        username:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [ADMIN, COMPLAINT_HANDLER, HOTEL_ADMIN, SYSTEM_ADMIN]
        password:
          type: string
        managedHotelId:
          type: string
          nullable: true
    SystemUserUpdateRequest:
      type: object
      required: [displayName, role]
      properties:
        displayName:
          type: string
        role:
          type: string
          enum: [ADMIN, COMPLAINT_HANDLER, HOTEL_ADMIN, SYSTEM_ADMIN]
        managedHotelId:
          type: string
          nullable: true
    SystemSettingUpdateRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
        description:
          type: string
          nullable: true
paths:
  /api/auth/login:
    post:
      summary: 登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
  /api/auth/register:
    post:
      summary: 注册游客账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK
  /api/auth/forgot-password/request-code:
    post:
      summary: 申请找回密码验证码
      responses:
        '200':
          description: OK
  /api/auth/forgot-password/reset:
    post:
      summary: 使用验证码重置密码
      responses:
        '200':
          description: OK
  /api/auth/me:
    get:
      summary: 获取当前用户
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/complaints:
    get:
      summary: 投诉列表（支持筛选）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: 游客提交投诉
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintCreateRequest'
      responses:
        '200':
          description: OK
  /api/complaints/{id}:
    get:
      summary: 投诉详情
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      responses:
        '200':
          description: OK
  /api/complaints/{id}/timeline:
    get:
      summary: 投诉时间线
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      responses:
        '200':
          description: OK
  /api/complaints/{id}/rating:
    post:
      summary: 结案后评价
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintRatingRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/approve:
    post:
      summary: 管理员审批通过投诉
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintActionRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/reject:
    post:
      summary: 管理员驳回投诉
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintActionRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/assign:
    post:
      summary: 管理员分派投诉
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintAssignRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/process:
    post:
      summary: 处理员处理投诉
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintActionRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/close:
    post:
      summary: 管理员结案投诉
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintActionRequest'
      responses:
        '200':
          description: OK
  /api/emergency:
    get:
      summary: 游客侧应急列表（仅有效期内已发布）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/emergency/admin:
    get:
      summary: 管理侧应急列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: 新建应急草稿
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmergencyRequest'
      responses:
        '200':
          description: OK
  /api/emergency/admin/{id}:
    put:
      summary: 更新应急草稿
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmergencyRequest'
      responses:
        '200':
          description: OK
    delete:
      summary: 删除应急信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/emergency/admin/{id}/submit:
    post:
      summary: 提交应急审批
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/emergency/admin/{id}/approve:
    post:
      summary: 审批并发布应急信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/emergency/admin/{id}/reject:
    post:
      summary: 驳回应急信息
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmergencyReviewRequest'
      responses:
        '200':
          description: OK
  /api/hotels/admin:
    get:
      summary: 管理侧酒店列表
      description: HOTEL_ADMIN 仅查看自己绑定酒店，SYSTEM_ADMIN 可查看全量，ADMIN 无权访问。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: 新增酒店
      description: 仅 SYSTEM_ADMIN 可访问。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelAdminRequest'
      responses:
        '200':
          description: OK
  /api/hotels/admin/{id}:
    put:
      summary: 编辑酒店
      description: HOTEL_ADMIN 仅可编辑自己绑定酒店，SYSTEM_ADMIN 可维护全量。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelAdminRequest'
      responses:
        '200':
          description: OK
    delete:
      summary: 删除酒店
      description: 仅 SYSTEM_ADMIN 可访问。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/resources/{category}:
    get:
      summary: 平台管理员查询资源库列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: 平台管理员新增资源
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceItemRequest'
      responses:
        '200':
          description: OK
  /api/resources/{category}/{id}:
    get:
      summary: 平台管理员查询资源详情
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    put:
      summary: 平台管理员更新资源
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceItemRequest'
      responses:
        '200':
          description: OK
    delete:
      summary: 平台管理员删除资源
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/resources/{category}/{id}/online:
    post:
      summary: 资源上架
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/resources/{category}/{id}/offline:
    post:
      summary: 资源下架
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/system/users:
    get:
      summary: 系统管理员查询账号列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: 系统管理员创建账号
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemUserCreateRequest'
      responses:
        '200':
          description: OK
  /api/system/users/{id}:
    put:
      summary: 系统管理员更新账号
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemUserUpdateRequest'
      responses:
        '200':
          description: OK
  /api/system/users/{id}/reset-password:
    post:
      summary: 系统管理员重置账号密码
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/system/users/{id}/enable:
    post:
      summary: 启用账号
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/system/users/{id}/disable:
    post:
      summary: 停用账号
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/system/audit-logs:
    get:
      summary: 系统管理员查询审计日志
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/system/settings:
    get:
      summary: 系统管理员查询系统参数
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/system/settings/{key}:
    put:
      summary: 系统管理员更新系统参数
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettingUpdateRequest'
      responses:
        '200':
          description: OK
  /api/query/hotels:
    get:
      summary: 酒店查询
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/scenic-spots:
    get:
      summary: 景区查询（仅返回上架资源）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/routes:
    get:
      summary: 线路查询（仅返回上架资源）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/dining:
    get:
      summary: 餐饮查询（仅返回上架资源）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/performances:
    get:
      summary: 演出查询（仅返回上架资源）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
