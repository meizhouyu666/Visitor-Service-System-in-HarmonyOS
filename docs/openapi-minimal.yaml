openapi: 3.0.3
info:
  title: 游客服务系统 API（最小契约）
  version: 2.4.0
servers:
  - url: http://localhost:8081
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ComplaintId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        displayName:
          type: string
    AuthUserResponse:
      type: object
      description: 登录与当前用户信息。正式角色为 VISITOR、ADMIN、COMPLAINT_HANDLER、HOTEL_ADMIN、SYSTEM_ADMIN。
      properties:
        username:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [VISITOR, ADMIN, COMPLAINT_HANDLER, HOTEL_ADMIN, SYSTEM_ADMIN]
        permissions:
          type: array
          description: 由角色派生的权限，不单独落权限表。
          items:
            type: string
            enum:
              - COMPLAINT_MANAGE
              - COMPLAINT_PROCESS
              - EMERGENCY_MANAGE
              - MARKETING_MANAGE
              - RESOURCE_MANAGE
              - HOTEL_ROOM_MANAGE
              - USER_MANAGE
              - SYSTEM_CONFIG_MANAGE
              - AUDIT_LOG_VIEW
    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/AuthUserResponse'
        - type: object
          properties:
            token:
              type: string
    RequestResetCodeRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
    ResetPasswordRequest:
      type: object
      required: [username, code, newPassword]
      properties:
        username:
          type: string
        code:
          type: string
        newPassword:
          type: string
    ComplaintCreateRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        attachmentUrls:
          type: string
          nullable: true
    ComplaintActionRequest:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
    ComplaintAssignRequest:
      type: object
      required: [assigneeUsername]
      properties:
        assigneeUsername:
          type: string
        comment:
          type: string
          nullable: true
    ComplaintRatingRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
    HotelResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        availabilityStatus:
          type: string
          description: 可选，房态标签（AVAILABLE/LIMITED/BUSY/FULL）
        coverImageUrl:
          type: string
          nullable: true
          description: 可选，酒店封面图标识
    HotelAdminRequest:
      type: object
      required: [name, address, star, price, phone, score, hasBreakfast, facility, introduction]
      properties:
        name:
          type: string
        address:
          type: string
        star:
          type: integer
        price:
          type: integer
        phone:
          type: string
        score:
          type: number
        hasBreakfast:
          type: boolean
        facility:
          type: string
        introduction:
          type: string
        availabilityStatus:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
    ScenicSpotResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        crowdHeat:
          type: integer
          nullable: true
          description: 可选，客流热度百分比（0-100）
        coverImageUrl:
          type: string
          nullable: true
          description: 可选，景区封面图标识
    EmergencyResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        alertLevel:
          type: string
          nullable: true
          description: 可选，预警等级（HIGH/MEDIUM/LOW）
        alertType:
          type: string
          nullable: true
          description: 可选，预警类型（WEATHER/TRAFFIC/GENERAL）
    TrafficResponse:
      type: object
      properties:
        fromLocation:
          type: string
        toLocation:
          type: string
        severityLevel:
          type: string
          nullable: true
          description: 可选，路况告警级别（HIGH/MEDIUM/LOW）
paths:
  /api/auth/login:
    post:
      summary: 登录
      description: 旧 writer/approver 账号登录后按 ADMIN 返回；旧 HOTEL_MANAGER/HOTELADMIN 按 HOTEL_ADMIN 返回。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /api/auth/register:
    post:
      summary: 注册游客账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK
  /api/auth/forgot-password/request-code:
    post:
      summary: 申请找回密码验证码（站内 debugCode）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestResetCodeRequest'
      responses:
        '200':
          description: OK
  /api/auth/forgot-password/reset:
    post:
      summary: 使用验证码重置密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: OK
  /api/auth/me:
    get:
      summary: 获取当前用户
      description: 返回 role 与角色派生 permissions，供前端菜单和按钮显隐使用。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
  /api/complaints:
    get:
      summary: 投诉列表（支持筛选）
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: createdBy
          schema:
            type: string
        - in: query
          name: assignee
          schema:
            type: string
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
        - in: query
          name: to
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: 提交投诉
      description: 仅 VISITOR 可提交投诉。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintCreateRequest'
      responses:
        '200':
          description: OK
  /api/complaints/{id}:
    get:
      summary: 投诉详情
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      responses:
        '200':
          description: OK
  /api/complaints/{id}/timeline:
    get:
      summary: 投诉时间线
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      responses:
        '200':
          description: OK
  /api/complaints/{id}/rating:
    post:
      summary: 结案后评价
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintRatingRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/approve:
    post:
      summary: 审批通过
      description: 需要 COMPLAINT_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintActionRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/reject:
    post:
      summary: 驳回投诉
      description: 需要 COMPLAINT_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintActionRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/assign:
    post:
      summary: 分派投诉
      description: 需要 COMPLAINT_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintAssignRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/process:
    post:
      summary: 处理投诉
      description: 需要 COMPLAINT_PROCESS 权限；COMPLAINT_HANDLER 只能处理分派给自己的投诉。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintActionRequest'
      responses:
        '200':
          description: OK
  /api/complaints/admin/{id}/close:
    post:
      summary: 结案投诉
      description: 需要 COMPLAINT_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ComplaintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintActionRequest'
      responses:
        '200':
          description: OK
  /api/emergency:
    get:
      summary: 游客侧应急列表（仅有效窗口内已发布）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/emergency/admin:
    get:
      summary: 管理侧应急列表
      description: 需要 EMERGENCY_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: 新建应急草稿
      description: 需要 EMERGENCY_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/emergency/admin/{id}:
    put:
      summary: 更新应急草稿
      description: 需要 EMERGENCY_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    delete:
      summary: 删除应急信息
      description: 需要 EMERGENCY_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/emergency/admin/{id}/submit:
    post:
      summary: 提交应急审批
      description: 需要 EMERGENCY_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/emergency/admin/{id}/approve:
    post:
      summary: 审批并发布应急信息
      description: 需要 EMERGENCY_MANAGE 权限（ADMIN）。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/hotels/admin:
    get:
      summary: 管理侧酒店列表
      description: 仅 HOTEL_ADMIN 可访问；ADMIN 不再拥有酒店资料维护权限。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: 新增酒店
      description: 仅 HOTEL_ADMIN 可访问；ADMIN 不再拥有酒店资料维护权限。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelAdminRequest'
      responses:
        '200':
          description: OK
  /api/hotels/admin/{id}:
    put:
      summary: 编辑酒店
      description: 仅 HOTEL_ADMIN 可访问；ADMIN 不再拥有酒店资料维护权限。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelAdminRequest'
      responses:
        '200':
          description: OK
    delete:
      summary: 删除酒店
      description: 仅 HOTEL_ADMIN 可访问；ADMIN 不再拥有酒店资料维护权限。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/hotels:
    get:
      summary: 酒店查询
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/query/hotels/star:
    get:
      summary: 星级酒店查询（兼容）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/hotels/non-star:
    get:
      summary: 非星级/乡村酒店查询（兼容）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/scenic-spots:
    get:
      summary: 景区查询
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/query/routes:
    get:
      summary: 线路查询
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/query/dining:
    get:
      summary: 餐饮查询
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/query/entertainment:
    get:
      summary: 娱乐查询
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/query/dining-entertainment:
    get:
      summary: 餐饮娱乐综合查询（兼容）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/performances:
    get:
      summary: 演出查询
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/query/weather:
    get:
      summary: 天气查询
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/traffic:
    get:
      summary: 路况查询
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/query/weather-traffic:
    get:
      summary: 天气路况综合查询（兼容）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
